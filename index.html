<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ECP Fitness — Occupancy Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    #meta {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 32px;
    }

    #status {
      color: #f59e0b;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 24px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 20px;
    }

    .card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    canvas { width: 100% !important; }

    #summary {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .stat {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 16px 24px;
    }

    .stat .label { font-size: 0.75rem; color: #666; margin-bottom: 4px; }
    .stat .value { font-size: 1.8rem; font-weight: 700; color: #fff; }
    .stat .sub   { font-size: 0.75rem; color: #888; margin-top: 2px; }
  </style>
</head>
<body>

<h1>ECP Fitness — Occupancy Dashboard</h1>
<div id="meta">Data from ECP portal · Updates every 5 min · Times in São Paulo (local)</div>
<div id="status">Loading data…</div>

<div id="summary"></div>
<div class="grid" id="charts"></div>

<script>
const CSV_URL = "https://raw.githubusercontent.com/turingkapital/Clube-Pinheiros-Fitness-Tracker/main/data/occupancy.csv";

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const COLORS = ["#6366f1","#10b981","#f59e0b","#ef4444","#3b82f6","#8b5cf6","#ec4899"];

async function load() {
  const res = await fetch(CSV_URL + "?t=" + Date.now());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

function parseCSV(text) {
  const lines = text.trim().split("\n").slice(1);
  return lines.map(line => {
    const [ts, occ] = line.split(",");
    const date = new Date(ts.trim() + "Z"); // stored as UTC
    return { date, occupancy: parseInt(occ, 10) };
  }).filter(r => !isNaN(r.occupancy) && !isNaN(r.date));
}

// 144 buckets = 24 hours × 6 ten-minute slots
function tenMinuteAverages(records) {
  const buckets = Array.from({length: 144}, () => ({ sum: 0, count: 0 }));
  for (const r of records) {
    const h = r.date.getHours();               // local time
    const m = r.date.getMinutes();
    const bucket = h * 6 + Math.floor(m / 10);
    buckets[bucket].sum += r.occupancy;
    buckets[bucket].count++;
  }
  return buckets.map(b => b.count > 0 ? +(b.sum / b.count).toFixed(1) : null);
}

function buildChart(canvasId, label, avgs, color) {
  const labels = Array.from({length: 144}, (_, i) => {
    const h = Math.floor(i / 6);
    const m = (i % 6) * 10;
    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  });

  new Chart(document.getElementById(canvasId), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Avg occupancy",
        data: avgs,
        borderColor: color,
        backgroundColor: color + "22",
        fill: true,
        tension: 0.4,
        pointRadius: 2,
        spanGaps: false,
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color: "#666", maxRotation: 0, autoSkip: true, maxTicksLimit: 12 },
          grid: { color: "#2a2d3a" }
        },
        y: {
          beginAtZero: true,
          ticks: { color: "#666" },
          grid: { color: "#2a2d3a" }
        }
      }
    }
  });
}

async function main() {
  try {
    const text = await load();
    const records = parseCSV(text);

    if (records.length === 0) {
      document.getElementById("status").textContent = "No data yet — check back after the scraper has run.";
      return;
    }

    const lastDate = records.at(-1).date;
    const lastLocal = lastDate.toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" });
    document.getElementById("status").textContent =
      `${records.length} data points collected · Last: ${lastLocal}`;

    // Summary stats
    const occs = records.map(r => r.occupancy);
    const max = Math.max(...occs);
    const peakRecord = records.find(r => r.occupancy === max);
    const avg = (occs.reduce((a,b) => a+b, 0) / occs.length).toFixed(1);
    const latest = records.at(-1).occupancy;
    const peakLocal = peakRecord.date.toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" });

    document.getElementById("summary").innerHTML = `
      <div class="stat"><div class="label">Right now</div><div class="value">${latest}</div><div class="sub">people</div></div>
      <div class="stat"><div class="label">All-time peak</div><div class="value">${max}</div><div class="sub">${peakLocal}</div></div>
      <div class="stat"><div class="label">Overall average</div><div class="value">${avg}</div><div class="sub">people</div></div>
      <div class="stat"><div class="label">Data points</div><div class="value">${records.length}</div><div class="sub">~5 min intervals</div></div>
    `;

    // Per-day charts
    const chartsEl = document.getElementById("charts");
    for (let d = 0; d < 7; d++) {
      const dayRecords = records.filter(r => r.date.getDay() === d);
      if (dayRecords.length === 0) continue;

      const id = `chart-${d}`;
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<h2>${DAYS[d]} <span style="color:#555;font-weight:400">(${dayRecords.length} pts)</span></h2><canvas id="${id}"></canvas>`;
      chartsEl.appendChild(card);

      buildChart(id, DAYS[d], tenMinuteAverages(dayRecords), COLORS[d]);
    }

  } catch (err) {
    document.getElementById("status").textContent = `Error: ${err.message}. Make sure CSV_URL is set correctly.`;
  }
}

main();
</script>
</body>
</html>
